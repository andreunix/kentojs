name: Publish Packages (GitHub Packages)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace path opcional (ex.: packages/core)"
        required: false
        type: string
  push:
    tags:
      - "@kento/*@*"
      - "kento@*"

permissions:
  contents: read
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v5

      - name: Discover publishable workspaces
        id: discover
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs')
          const path = require('node:path')

          const root = process.cwd()
          const packagesDir = path.join(root, 'packages')
          const dirs = fs.readdirSync(packagesDir, { withFileTypes: true })
            .filter(d => d.isDirectory())
            .map(d => path.join('packages', d.name))

          const inputPackage = process.env.INPUT_PACKAGE || ''
          const eventName = process.env.GITHUB_EVENT_NAME
          const tagName = process.env.GITHUB_REF_NAME || ''

          let tagPackage = ''
          let tagVersion = ''
          if (eventName === 'push' && tagName.includes('@')) {
            const idx = tagName.lastIndexOf('@')
            tagPackage = tagName.slice(0, idx)
            tagVersion = tagName.slice(idx + 1)
          }

          const matrix = []
          for (const workspace of dirs) {
            if (inputPackage && inputPackage !== workspace) continue

            const pkgPath = path.join(root, workspace, 'package.json')
            if (!fs.existsSync(pkgPath)) continue

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            if (pkg.private) continue

            const name = pkg.name || ''
            const version = pkg.version || ''

            if (!name || !version) continue

            // GitHub Packages (npm) aceita apenas pacotes com scope.
            if (!name.startsWith('@')) {
              console.log(`[skip] ${workspace}: package name '${name}' is unscoped`) 
              continue
            }

            if (eventName === 'push') {
              if (tagPackage && name !== tagPackage) continue
              if (tagVersion && version !== tagVersion) {
                console.log(`[skip] ${workspace}: version '${version}' does not match tag '${tagVersion}'`)
                continue
              }
            }

            matrix.push({ workspace, name, version })
          }

          const outputPath = process.env.GITHUB_OUTPUT
          fs.appendFileSync(outputPath, `matrix=${JSON.stringify(matrix)}\n`)
          fs.appendFileSync(outputPath, `count=${matrix.length}\n`)

          console.log(`Discovered ${matrix.length} publishable package(s)`)
          EOF
        env:
          INPUT_PACKAGE: ${{ inputs.package }}

  publish:
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Configure npm auth
        run: |
          cat <<EOF > ~/.npmrc
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already published
        id: exists
        shell: bash
        run: |
          bun <<'EOF'
          const pkgName = process.env.PKG_NAME
          const pkgVersion = process.env.PKG_VERSION
          const token = process.env.NODE_AUTH_TOKEN
          const url = `https://npm.pkg.github.com/${encodeURIComponent(pkgName)}`

          const res = await fetch(url, {
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.npm.install-v1+json',
            },
          })

          let exists = false
          if (res.ok) {
            const data = await res.json()
            exists = Boolean(data?.versions?.[pkgVersion])
          }

          const outputPath = process.env.GITHUB_OUTPUT
          await Bun.write(outputPath, `exists=${exists}\n`, { append: true })
          console.log(exists
            ? `Already published: ${pkgName}@${pkgVersion}`
            : `Version not found yet: ${pkgName}@${pkgVersion}`)
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_NAME: ${{ matrix.pkg.name }}
          PKG_VERSION: ${{ matrix.pkg.version }}

      - name: Publish workspace with Bun
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          cd "${{ matrix.pkg.workspace }}"
          bun publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN }}

      - name: Summary
        run: |
          echo "Published/verified: ${{ matrix.pkg.name }}@${{ matrix.pkg.version }}"
